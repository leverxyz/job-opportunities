<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Opportunity Board</title>
<style>
  :root {
    --paper:      #f6f6f4;
    --card:       #ffffff;
    --row-alt:    #f0f1f4;
    --line:       #e4e5e9;
    --ink:        #1c1d21;
    --ink-soft:   #6b6d76;
    --ink-faint:  #9a9ca4;
    --blueprint:  #1f3a5f;
    --red:   #c2352b; --red-bg:   #fbe9e7;
    --amber: #9a6a00; --amber-bg: #fbf1d9;
    --green: #2f7a4d; --green-bg: #e7f3ea;
    --blue:  #2b5aa0; --blue-bg:  #e8eff8;
    --teal:  #1f7a75; --teal-bg:  #e3f2f0;
    --gray-pill: #eceef1;
    --radius: 14px;
    --mono: ui-monospace, "SF Mono", "SFMono-Regular", Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --paper:#17181b; --card:#1f2024; --row-alt:#28292e; --line:#313239;
      --ink:#ececee; --ink-soft:#a4a6ad; --ink-faint:#6f717a; --blueprint:#7fa8d6;
      --red-bg:#3a1f1d; --amber-bg:#352c14; --green-bg:#17301f; --blue-bg:#1c2a3f; --teal-bg:#153030;
      --gray-pill:#2c2d33;
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { background: var(--paper); color: var(--ink); font-family: var(--sans);
    -webkit-font-smoothing: antialiased; font-size: 14px; line-height: 1.5; }

  /* password gate */
  #gate { position: fixed; inset: 0; z-index: 50; background: var(--paper);
    display: flex; align-items: center; justify-content: center; padding: 24px; }
  #gate .box { width: 100%; max-width: 360px; text-align: center; }
  #gate .mark { font-family: var(--mono); font-size: 12px; letter-spacing: 2px;
    text-transform: uppercase; color: var(--blueprint); margin-bottom: 18px; }
  #gate h1 { font-size: 20px; margin: 0 0 6px; font-weight: 600; }
  #gate p { color: var(--ink-soft); margin: 0 0 24px; font-size: 13px; }
  #gate input { width: 100%; padding: 12px 14px; font-size: 15px; border: 1px solid var(--line);
    border-radius: 10px; background: var(--card); color: var(--ink); outline: none; font-family: var(--sans); }
  #gate input:focus { border-color: var(--blueprint); }
  #gate button { width: 100%; margin-top: 10px; padding: 12px 14px; font-size: 15px; font-weight: 600;
    color: #fff; background: var(--blueprint); border: none; border-radius: 10px; cursor: pointer; }
  #gate button:active { opacity: .85; }
  #gate .err { color: var(--red); font-size: 13px; margin-top: 12px; min-height: 18px; }

  /* app */
  #app { display: none; max-width: 1400px; margin: 0 auto; padding: 28px 16px 60px; }
  header.board { margin-bottom: 18px; }
  .eyebrow { font-family: var(--mono); font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--blueprint); margin-bottom: 6px; }
  h1.title { font-size: 24px; font-weight: 650; margin: 0 0 4px; letter-spacing: -.2px; }
  .meta { color: var(--ink-faint); font-size: 12.5px; }
  .meta b { color: var(--ink-soft); font-weight: 600; }

  .controls { display: flex; gap: 8px; margin: 16px 0 14px; flex-wrap: wrap; }
  .seg { display: inline-flex; background: var(--gray-pill); border-radius: 9px; padding: 3px; }
  .seg button { border: none; background: transparent; color: var(--ink-soft); font-family: var(--sans);
    font-size: 12.5px; font-weight: 600; padding: 6px 14px; border-radius: 7px; cursor: pointer; }
  .seg button.on { background: var(--card); color: var(--ink); box-shadow: 0 1px 2px rgba(0,0,0,.08); }

  .tablewrap { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
    overflow: hidden; box-shadow: 0 1px 2px rgba(0,0,0,.04); }
  .scroll { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 1230px; table-layout: fixed; }
  thead th { position: sticky; top: 0; z-index: 2; background: var(--card); text-align: left;
    font-size: 11px; letter-spacing: .6px; text-transform: uppercase; color: var(--ink-faint);
    font-weight: 600; padding: 13px 16px; border-bottom: 1px solid var(--line); white-space: nowrap; }
  thead th:first-child { width: 420px; }
  thead th:nth-child(2) { width: 90px; }
  thead th:nth-child(3) { width: 170px; }
  thead th:nth-child(4) { width: 150px; }
  thead th:nth-child(5) { width: 150px; }
  thead th:nth-child(6) { width: 160px; }
  thead th:last-child { width: 110px; text-align: center; }
  tbody td:last-child { text-align: center; }
  tbody td { padding: 12px 16px; vertical-align: top; border-bottom: 1px solid var(--line); }
  tbody tr:last-child td { border-bottom: none; }
  tr.alt td { background: var(--row-alt); }
  tr:hover td { background: color-mix(in srgb, var(--blueprint) 6%, transparent); }

  .job { font-weight: 600; color: var(--ink); }
  .desc-cell { color: var(--ink-soft); font-size: 12.5px; line-height: 1.5; margin-top: 5px; }
  .jobid { font-family: var(--mono); font-size: 11px; color: var(--ink-faint); margin-top: 3px; }
  .loc { color: var(--ink-soft); white-space: normal; max-width: 190px; font-size: 12.5px; }
  .keydates { color: var(--ink-soft); white-space: normal; max-width: 240px; }
  .mag { font-family: var(--mono); font-variant-numeric: tabular-nums; color: var(--ink); white-space: normal; word-break: break-word; }
  .srctype { font-weight: 600; color: var(--ink); }
  .srcdetail { color: var(--ink-faint); font-size: 12px; margin-top: 3px; overflow-wrap: break-word; }
  td { overflow: hidden; }

  .chip { display: block; margin-bottom: 4px; padding: 2px 8px; font-size: 11px;
    font-weight: 600; border-radius: 999px; white-space: nowrap; width: fit-content; }
  .chip.red { color: var(--red); background: var(--red-bg); }
  .chip.amber { color: var(--amber); background: var(--amber-bg); }
  .chip.green { color: var(--green); background: var(--green-bg); }
  .chip.gray { color: var(--ink-faint); background: var(--gray-pill); }

  .pill { display: inline-block; padding: 3px 9px; font-size: 11px; font-weight: 600;
    border-radius: 999px; white-space: nowrap; color: var(--ink-soft); background: var(--gray-pill); }
  .setaside { font-family: var(--mono); font-size: 10.5px; letter-spacing: .3px; }
  .setaside.none { color: var(--ink-faint); background: transparent; padding-left: 0; }

  /* status colors */
  .st-new       { color: var(--blue);  background: var(--blue-bg); }
  .st-review    { color: var(--amber); background: var(--amber-bg); }
  .st-interested{ color: var(--teal);  background: var(--teal-bg); }
  .st-bidding   { color: #fff;         background: var(--blueprint); }
  .st-submitted { color: var(--green); background: var(--green-bg); }
  .st-archive   { color: var(--ink-faint); background: var(--gray-pill); }

  .empty { padding: 48px 20px; text-align: center; color: var(--ink-faint); }
  footer.note { margin-top: 16px; text-align: center; color: var(--ink-faint); font-size: 11.5px; }

  .add-btn { padding: 7px 18px; font-size: 12.5px; font-weight: 600; color: #fff;
    background: var(--blueprint); border: none; border-radius: 9px; cursor: pointer; }
  .add-btn:active { opacity: .85; }

  .modal { display: none; position: fixed; inset: 0; z-index: 60; background: rgba(0,0,0,.4);
    align-items: center; justify-content: center; padding: 20px; }
  .modal.show { display: flex; }
  .modal-box { width: 100%; max-width: 560px; background: var(--card); border-radius: var(--radius);
    box-shadow: 0 4px 24px rgba(0,0,0,.15); max-height: 90vh; overflow-y: auto; }
  .modal-head { display: flex; align-items: center; justify-content: space-between;
    padding: 18px 22px; border-bottom: 1px solid var(--line); }
  .modal-head h2 { margin: 0; font-size: 17px; font-weight: 650; }
  .close-btn { background: none; border: none; font-size: 22px; color: var(--ink-faint); cursor: pointer; padding: 0 4px; }
  .modal-body { padding: 20px 22px; display: flex; flex-direction: column; gap: 14px; }
  .modal-body label { display: flex; flex-direction: column; gap: 4px; font-size: 12px;
    font-weight: 600; color: var(--ink-soft); text-transform: uppercase; letter-spacing: .4px; }
  .modal-body input, .modal-body textarea, .modal-body select { padding: 9px 12px;
    font-size: 14px; font-family: var(--sans); border: 1px solid var(--line); border-radius: 8px;
    background: var(--paper); color: var(--ink); outline: none; }
  .modal-body input:focus, .modal-body textarea:focus, .modal-body select:focus { border-color: var(--blueprint); }
  .row { display: flex; gap: 12px; }
  .row label { flex: 1; }
  .row.three label { flex: 1; }
  .save-btn { padding: 11px; font-size: 14px; font-weight: 600; color: #fff;
    background: var(--blueprint); border: none; border-radius: 9px; cursor: pointer; margin-top: 4px; }

  .del-btn, .edit-btn, .link-btn { background: none; border: 1px solid var(--line); font-size: 11px; color: var(--ink-faint);
    cursor: pointer; padding: 2px 8px; border-radius: 6px; font-family: var(--sans); margin-left: 6px;
    text-decoration: none; display: inline-block; }
  .del-btn:hover { color: var(--red); border-color: var(--red); }
  .edit-btn:hover { color: var(--blueprint); border-color: var(--blueprint); }
  .link-btn:hover { color: var(--teal); border-color: var(--teal); }
  .del-btn:disabled, .edit-btn:disabled { opacity: .5; cursor: default; }

  .tier { display: inline-block; padding: 1px 7px; font-size: 10px; font-weight: 700;
    border-radius: 4px; letter-spacing: .3px; vertical-align: middle; margin-right: 5px; }
  .t1 { color: #fff; background: #1a7a3a; }
  .t2 { color: #fff; background: var(--blueprint); }
  .t3 { color: var(--amber); background: var(--amber-bg); }
  .t4 { color: var(--blue); background: var(--blue-bg); }
  .t5 { color: var(--ink-faint); background: var(--gray-pill); }
  .tcr { color: #fff; background: #c2352b; }
  .tlane { color: var(--teal); background: var(--teal-bg); }

  .tag-chip { display: inline-block; padding: 1px 8px; font-size: 10.5px; font-weight: 600;
    border-radius: 999px; color: var(--ink-soft); background: var(--gray-pill);
    margin-bottom: 4px; margin-top: 3px; }
  @media (max-width: 560px) { #app { padding: 18px 12px 40px; } h1.title { font-size: 20px; } }
</style>
</head>
<body>

  <div id="gate">
    <div class="box">
      <h1>Project Opportunity Board</h1>
      <p>Enter the team password to view.</p>
      <input id="pw" type="password" placeholder="Password" autocomplete="current-password" />
      <button id="go">View board</button>
      <div class="err" id="err"></div>
    </div>
  </div>

  <div id="app">
    <header class="board">
      <h1 class="title">Project Opportunity Board</h1>
      <div class="meta"><b id="count">0</b> open opportunities · updated <b id="updated">—</b></div>
    </header>

    <div class="controls">
      <div class="seg" id="boards">
        <button data-board="HigherGov" class="on">HigherGov</button>
        <button data-board="BidNet">BidNet</button>
        <button data-board="DPMC">DPMC</button>
        <button data-board="GC Email">General Contractors</button>
      </div>
      <button id="addBtn" class="add-btn">+ Add New</button>
    </div>

    <!-- Add New Modal -->
    <div id="modal" class="modal">
      <div class="modal-box">
        <div class="modal-head">
          <h2 id="modalTitle">Add Opportunity</h2>
          <button id="closeModal" class="close-btn">&times;</button>
        </div>
        <div class="modal-body">
          <label>Project Name <input id="f-name" type="text" placeholder="Project name" /></label>
          <label>Description <textarea id="f-desc" rows="3" placeholder="Brief description"></textarea></label>
          <div class="row three">
            <label>Tier
              <select id="f-tier">
                <option value="Tier 1">Tier 1 — APPLIED-PRIME</option>
                <option value="Tier 2">Tier 2 — CONCORD-PRIME</option>
                <option value="Tier 3">Tier 3 — APPLIED-SUB</option>
                <option value="Tier 4">Tier 4 — CONCORD-SUB</option>
                <option value="Tier 5">Tier 5 — APPLIED-SUB-MEP</option>
              </select>
            </label>
            <label>Set Aside
              <select id="f-setaside">
                <option value="NONE">NONE</option><option value="SBA">SBA</option>
                <option value="SDVOSB">SDVOSB</option><option value="HUBZone">HUBZone</option>
                <option value="WOSB">WOSB</option><option value="Other">Other</option>
              </select>
            </label>
            <label>Board Tab
              <select id="f-srctype">
                <option value="HigherGov">HigherGov</option><option value="BidNet">BidNet</option>
                <option value="DPMC">DPMC</option><option value="GC Email">General Contractors</option>
              </select>
            </label>
          </div>
          <label>Source Detail <input id="f-srcdetail" type="text" placeholder="Agency or GC name" /></label>
          <div class="row">
            <label>Location <input id="f-loc" type="text" placeholder="City, ST" /></label>
            <label>Magnitude <input id="f-mag" type="text" placeholder="$500K – $1M" /></label>
          </div>
          <div class="row three">
            <label>Site Visit <input id="f-site" type="date" /></label>
            <label>RFI Due <input id="f-rfi" type="date" /></label>
            <label>Bid Due <input id="f-bid" type="date" /></label>
          </div>
          <button id="saveNew" class="save-btn">Save Opportunity</button>
        </div>
      </div>
    </div>

    <div class="tablewrap">
      <div class="scroll">
        <table>
          <thead>
            <tr>
              <th>Opportunity</th>
              <th>Set Aside</th>
              <th>Location</th>
              <th>Key Dates</th>
              <th>Magnitude</th>
              <th>Source</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </div>

    <footer class="note">Add / Edit / Delete save straight to GitHub · sorted by soonest bid due</footer>
  </div>

<script>
  // ---- CONFIG: change this password. Soft gate only, not real security. ----
  const PASSWORD = "concord2026";
  const STORAGE_KEY = "jobboard_ok";

  const store = {
    get(k){ try { return localStorage.getItem(k); } catch(e){ return null; } },
    set(k,v){ try { localStorage.setItem(k,v); } catch(e){} }
  };

  const gate = document.getElementById('gate');
  const app  = document.getElementById('app');
  const pw   = document.getElementById('pw');
  const err  = document.getElementById('err');

  function unlock(){ gate.style.display='none'; app.style.display='block'; load(); }
  function tryPw(){
    if (pw.value === PASSWORD){ store.set(STORAGE_KEY,'1'); unlock(); }
    else { err.textContent = 'Incorrect password.'; pw.value=''; pw.focus(); }
  }
  document.getElementById('go').addEventListener('click', tryPw);
  pw.addEventListener('keydown', e => { if(e.key==='Enter') tryPw(); });
  if (store.get(STORAGE_KEY)==='1') { unlock(); } else { pw.focus(); }

  // ---- helpers ----
  const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const multiline = s => esc(s).replace(/\n/g, '<br>');

  function fmtDate(iso){
    if (!iso) return '—';
    const d = new Date(iso + 'T00:00:00');
    if (isNaN(d)) return esc(iso);
    return d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
  }

  function eventChip(iso, label){
    if (!iso) return '';
    const today = new Date(); today.setHours(0,0,0,0);
    const d = new Date(iso + 'T00:00:00');
    if (isNaN(d)) return '';
    const days = Math.round((d - today) / 86400000);
    let cls, text;
    if (days < 0)        { cls='gray'; text = Math.abs(days)+'d ago — '+label; }
    else if (days === 0) { cls='red';  text = label+' today'; }
    else if (days <= 3)  { cls='red';  text = label+' in '+days+'d'; }
    else if (days <= 14) { cls='amber';text = label+' in '+days+'d'; }
    else                 { cls='green';text = label+' in '+days+'d'; }
    return '<span class="chip '+cls+'">'+text+'</span>';
  }

  function setAsidePill(v){
    if (!v || v === 'NONE') return '<span class="pill setaside">NONE</span>';
    return '<span class="pill setaside">'+esc(v)+'</span>';
  }

  const STATUS_ORDER = { 'new':1,'review':2,'interested':3,'bidding':4,'submitted':5,'archive':6 };
  function statusPill(s){
    const key = String(s||'New').toLowerCase();
    const cls = 'st-' + (STATUS_ORDER[key] ? key : 'new');
    return '<span class="pill '+cls+'">'+esc(s||'New')+'</span>';
  }

  function tierBadge(t){
    if (!t) return '';
    const cls = t === 'Tier 1' ? 'tier t1' : t === 'Tier 2' ? 'tier t2' :
               t === 'Tier 3' ? 'tier t3' : t === 'Tier 4' ? 'tier t4' :
               t === 'Tier 5' ? 'tier t5' : t === 'CHIEF-REVIEW' ? 'tier tcr' :
               t.startsWith('Lane') ? 'tier tlane' : 'tier';
    return '<span class="'+cls+'">'+esc(t)+'</span>';
  }

  // ---- GitHub write-back (fine-grained PAT, Contents API) ----
  // This token is scoped to ONLY this one repo, Contents: read/write, nothing
  // else -- it cannot reach any other repo or account resource. Since this
  // repo is public and this file is served as-is, the token is visible to
  // anyone who views source. That is a known, accepted tradeoff (Chief,
  // 2026-07-18) -- not an oversight. Worst case: someone corrupts this
  // board's data. All rendered fields go through esc()/multiline(), so a
  // malicious entry cannot inject a script that runs in a visitor's browser.
  const GH_TOKEN = "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";
  const GH_API = "https://api.github.com/repos/leverxyz/job-opportunities/contents/data.json";

  function utf8ToBase64(str){
    const bytes = new TextEncoder().encode(str);
    let bin = '';
    bytes.forEach(b => bin += String.fromCharCode(b));
    return btoa(bin);
  }
  function base64ToUtf8(b64){
    const bin = atob(b64.replace(/\n/g, ''));
    const bytes = Uint8Array.from(bin, c => c.charCodeAt(0));
    return new TextDecoder().decode(bytes);
  }

  async function ghGetFile(){
    const res = await fetch(GH_API, {
      headers: { Authorization: 'Bearer ' + GH_TOKEN, Accept: 'application/vnd.github+json' }
    });
    if (!res.ok) throw new Error('Could not load the latest board data (HTTP ' + res.status + ').');
    const data = await res.json();
    const parsed = JSON.parse(base64ToUtf8(data.content));
    return {
      sha: data.sha,
      jobs: Array.isArray(parsed.jobs) ? parsed.jobs : [],
      excludedKeys: Array.isArray(parsed.excludedKeys) ? parsed.excludedKeys : [],
    };
  }

  async function ghSaveFile(jobs, excludedKeys, sha, message){
    const payload = {
      board: 'Project Opportunity Board',
      updated: new Date().toISOString().replace(/\.\d{3}Z$/, 'Z'),
      jobs: jobs,
      excludedKeys: excludedKeys,
    };
    const res = await fetch(GH_API, {
      method: 'PUT',
      headers: {
        Authorization: 'Bearer ' + GH_TOKEN,
        Accept: 'application/vnd.github+json',
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        message: message,
        content: utf8ToBase64(JSON.stringify(payload, null, 2) + '\n'),
        sha: sha,
      }),
    });
    if (res.status === 409) { const e = new Error('conflict'); e.conflict = true; throw e; }
    if (!res.ok) { const t = await res.text(); throw new Error('Save failed (HTTP ' + res.status + '): ' + t.slice(0, 300)); }
    return res.json();
  }

  // mutateFn(jobs, excludedKeys) -> { jobs, excludedKeys }. Always re-fetches
  // the live file first so a manual edit never overwrites a same-minute
  // cron sync (or another teammate's edit) -- on a 409 (someone saved in
  // between), refetch and retry once with the fresh sha before giving up.
  async function persistChange(mutateFn, message){
    let lastErr;
    for (let attempt = 0; attempt < 2; attempt++){
      try {
        const { sha, jobs, excludedKeys } = await ghGetFile();
        const result = mutateFn(jobs, excludedKeys);
        await ghSaveFile(result.jobs, result.excludedKeys, sha, message);
        allJobs = result.jobs;
        render();
        return;
      } catch (e) {
        lastErr = e;
        if (e && e.conflict) continue;
        throw e;
      }
    }
    throw lastErr;
  }

  const TIER_TAG = {
    'Tier 1': 'APPLIED-PRIME', 'Tier 2': 'CONCORD-PRIME', 'Tier 3': 'APPLIED-SUB',
    'Tier 4': 'CONCORD-SUB', 'Tier 5': 'APPLIED-SUB-MEP',
  };

  let allJobs = [];
  let board = 'HigherGov';

  function render(){
    const rows = document.getElementById('rows');
    let list = allJobs.slice();
    if (board !== 'all') {
      list = list.filter(j => j.sourceType === board);
    }
    // Hide expired/cancelled
    list = list.filter(j => !['expired','archive'].includes((j.status||'').toLowerCase()));

    list.sort((a,b) => {
      if (!a.bidDueDate) return 1;
      if (!b.bidDueDate) return -1;
      return a.bidDueDate < b.bidDueDate ? -1 : a.bidDueDate > b.bidDueDate ? 1 : 0;
    });

    document.getElementById('count').textContent = list.length;

    if (!list.length){
      rows.innerHTML = '<tr><td colspan="7"><div class="empty">No jobs to show.</div></td></tr>';
      return;
    }

    rows.innerHTML = list.map((j, i) => {
      const alt = i % 2 === 1 ? ' alt' : '';
      return `
        <tr class="${alt ? 'alt' : ''}">
          <td><div class="job">${tierBadge(j.tier)} ${esc(j.jobName)}</div><div class="tag-chip">${esc(j.tag||'')}</div><div class="desc-cell">${multiline(j.projectDescription)}</div></td>
          <td>${setAsidePill(j.setAside)}</td>
          <td class="loc">${esc(j.location)}</td>
          <td class="keydates">
            ${eventChip(j.siteVisitDate, 'Site Visit')}
            ${eventChip(j.rfiDueDate, 'RFI Due')}
            ${eventChip(j.bidDueDate, 'Bid Due')}
          </td>
          <td class="mag">${esc(j.magnitude || '—')}</td>
          <td><div class="srctype">${esc(j.sourceType||'')}</div><div class="srcdetail">${esc(j.sourceDetail||'')}</div></td>
          <td><button class="edit-btn" data-key="${esc((j.sourceType||'')+'::'+(j.opportunityId||j.id||''))}">Edit</button> <button class="del-btn" data-key="${esc((j.sourceType||'')+'::'+(j.opportunityId||j.id||''))}">Delete</button>${j.link ? ` <a class="link-btn" href="${esc(j.link)}" target="_blank" rel="noopener">Link</a>` : ''}</td>
        </tr>`;
    }).join('');
  }

  document.querySelectorAll('#boards button').forEach(b => {
    b.addEventListener('click', () => {
      document.querySelectorAll('#boards button').forEach(x => x.classList.remove('on'));
      b.classList.add('on');
      board = b.dataset.board;
      render();
    });
  });

  // Delete buttons (event delegation)
  document.getElementById('rows').addEventListener('click', e => {
    if (e.target.classList.contains('edit-btn')) {
      const [srcType, oid] = e.target.dataset.key.split('::');
      const job = allJobs.find(j => (j.sourceType||'') === srcType && (j.opportunityId||j.id||'') === oid);
      if (!job) return;
      editingKey = { sourceType: srcType, opportunityId: oid };
      document.getElementById('f-name').value = job.jobName || '';
      document.getElementById('f-desc').value = job.projectDescription || '';
      document.getElementById('f-tier').value = job.tier || 'Tier 1';
      document.getElementById('f-setaside').value = job.setAside || 'NONE';
      document.getElementById('f-srctype').value = job.sourceType || 'HigherGov';
      if (!['HigherGov','BidNet','DPMC','GC Email'].includes(document.getElementById('f-srctype').value)) {
        document.getElementById('f-srctype').value = 'GC Email';
      }
      document.getElementById('f-srcdetail').value = job.sourceDetail || '';
      document.getElementById('f-loc').value = job.location || '';
      document.getElementById('f-mag').value = job.magnitude || '';
      document.getElementById('f-bid').value = job.bidDueDate || '';
      document.getElementById('f-site').value = job.siteVisitDate || '';
      document.getElementById('f-rfi').value = job.rfiDueDate || '';
      modalTitle.textContent = 'Edit Opportunity';
      saveBtn.textContent = 'Save Changes';
      modal.classList.add('show');
      return;
    }
    if (e.target.classList.contains('del-btn')) {
      const [srcType, oid] = e.target.dataset.key.split('::');
      if (!confirm('Delete this opportunity? This is permanent \u2014 it will not come back on the next sync.')) return;
      e.target.textContent = '\u2026';
      e.target.disabled = true;
      persistChange((jobs, excludedKeys) => {
        const filtered = jobs.filter(j => !((j.sourceType||'') === srcType && (j.opportunityId||j.id||'') === oid));
        const key = srcType + ':' + oid;
        const newExcluded = excludedKeys.includes(key) ? excludedKeys : excludedKeys.concat([key]);
        return { jobs: filtered, excludedKeys: newExcluded };
      }, 'Board: delete ' + srcType + ' ' + oid)
        .catch(err => { alert('Could not delete: ' + err.message); e.target.textContent = 'Delete'; e.target.disabled = false; });
    }
  });

  async function load(){
    try {
      const res = await fetch('data.json?t=' + Date.now());
      const data = await res.json();
      allJobs = Array.isArray(data.jobs) ? data.jobs : [];
      if (data.updated) document.getElementById('updated').textContent = fmtDate(data.updated.slice(0,10));
      render();
    } catch (e) {
      document.getElementById('rows').innerHTML =
        '<tr><td colspan="7"><div class="empty">Could not load data.json.</div></td></tr>';
    }
  }

  // ---- Add / Edit ----
  const modal = document.getElementById('modal');
  const modalTitle = document.getElementById('modalTitle');
  const saveBtn = document.getElementById('saveNew');
  let editingKey = null; // { sourceType, opportunityId } or null when adding

  function resetForm(){
    ['f-name','f-desc','f-srcdetail','f-loc','f-mag','f-bid','f-site','f-rfi'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('f-setaside').value = 'NONE';
    document.getElementById('f-srctype').value = 'HigherGov';
    document.getElementById('f-tier').value = 'Tier 1';
  }

  document.getElementById('addBtn').addEventListener('click', () => {
    editingKey = null;
    resetForm();
    if (board !== 'all') document.getElementById('f-srctype').value = board;
    modalTitle.textContent = 'Add Opportunity';
    saveBtn.textContent = 'Save Opportunity';
    modal.classList.add('show');
  });
  document.getElementById('closeModal').addEventListener('click', () => modal.classList.remove('show'));
  modal.addEventListener('click', e => { if (e.target === modal) modal.classList.remove('show'); });

  saveBtn.addEventListener('click', () => {
    const name = document.getElementById('f-name').value.trim();
    if (!name) return alert('Project name is required.');
    const tier = document.getElementById('f-tier').value;
    if (!tier) return alert('Tier is required \u2014 an untiered entry gets removed by the next daily sync.');

    const bid = document.getElementById('f-bid').value;
    const site = document.getElementById('f-site').value;
    const rfi = document.getElementById('f-rfi').value;

    let kd = [];
    if (site) kd.push('Site Visit: ' + fmtDate(site));
    if (rfi) kd.push('RFI Due: ' + fmtDate(rfi));
    if (bid) kd.push('Bid Due: ' + fmtDate(bid));
    if (!kd.length) kd.push('Bid Due: TBD');

    const formJob = {
      jobName: name,
      projectDescription: document.getElementById('f-desc').value.trim(),
      tier: tier,
      tag: TIER_TAG[tier] || '',
      setAside: document.getElementById('f-setaside').value,
      sourceType: document.getElementById('f-srctype').value,
      sourceDetail: document.getElementById('f-srcdetail').value.trim(),
      location: document.getElementById('f-loc').value.trim(),
      magnitude: document.getElementById('f-mag').value.trim() || 'Unknown',
      keyDates: kd.join('\n'),
      bidDueDate: bid || null,
      siteVisitDate: site || null,
      rfiDueDate: rfi || null,
      status: 'new',
    };

    saveBtn.disabled = true;
    const finish = () => { saveBtn.disabled = false; modal.classList.remove('show'); resetForm(); };

    if (editingKey) {
      saveBtn.textContent = 'Saving\u2026';
      persistChange((jobs, excludedKeys) => {
        const idx = jobs.findIndex(j => (j.sourceType||'') === editingKey.sourceType && (j.opportunityId||j.id||'') === editingKey.opportunityId);
        if (idx === -1) throw new Error('That entry no longer exists \u2014 someone may have deleted it. Refresh and try again.');
        jobs[idx] = Object.assign({}, jobs[idx], formJob, { opportunityId: editingKey.opportunityId });
        return { jobs, excludedKeys };
      }, 'Board: edit ' + editingKey.sourceType + ' ' + editingKey.opportunityId)
        .then(finish)
        .catch(err => { saveBtn.disabled = false; saveBtn.textContent = 'Save Changes'; alert('Could not save: ' + err.message); });
    } else {
      saveBtn.textContent = 'Saving\u2026';
      const opportunityId = 'manual-' + Date.now();
      formJob.opportunityId = opportunityId;
      persistChange((jobs, excludedKeys) => {
        jobs.unshift(formJob);
        return { jobs, excludedKeys };
      }, 'Board: add ' + formJob.sourceType + ' \u2014 ' + formJob.jobName)
        .then(finish)
        .catch(err => { saveBtn.disabled = false; saveBtn.textContent = 'Save Opportunity'; alert('Could not save: ' + err.message); });
    }
  });
</script>
</body>
</html>
